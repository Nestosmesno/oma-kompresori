<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="108 20 284 280"
   width="284"
   height="280"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#5a5a5a;stop-opacity:1" />
      <stop offset="50%"  style="stop-color:#3a3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#222222;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%"  style="stop-color:#d0d0d0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0b0b0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Hexagon -->
  <polygon points="250,32 362,97 362,227 250,292 138,227 138,97" fill="#1a1a1a" filter="url(#shadow)" />
  <polygon points="250,38 356,101 356,221 250,284 144,221 144,101" fill="url(#hexGrad)" />
  <polygon points="250,48 346,107 346,215 250,274 154,215 154,107" fill="none" stroke="#555555" stroke-width="2" />

  <!-- Gear -->
  <g transform="translate(250,161)" fill="url(#gearGrad)">
    <rect x="-8" y="-82" width="16" height="20" rx="2" />
    <rect x="-8" y="-82" width="16" height="20" rx="2" transform="rotate(30)" />
    <rect x="-8" y="-82" width="16" height="20" rx="2" transform="rotate(60)" />
    <rect x="-8" y="-82" width="16" height="20" rx="2" transform="rotate(90)" />
    <rect x="-8" y="-82" width="16" height="20" rx="2" transform="rotate(120)" />
    <rect x="-8" y="-82" width="16" height="20" rx="2" transform="rotate(150)" />
    <rect x="-8" y="-82" width="16" height="20" rx="2" transform="rotate(180)" />
    <rect x="-8" y="-82" width="16" height="20" rx="2" transform="rotate(210)" />
    <rect x="-8" y="-82" width="16" height="20" rx="2" transform="rotate(240)" />
    <rect x="-8" y="-82" width="16" height="20" rx="2" transform="rotate(270)" />
    <rect x="-8" y="-82" width="16" height="20" rx="2" transform="rotate(300)" />
    <rect x="-8" y="-82" width="16" height="20" rx="2" transform="rotate(330)" />
    <circle cx="0" cy="0" r="68" fill="none" stroke="url(#gearGrad)" stroke-width="18" />
    <circle cx="0" cy="0" r="30" fill="#3a3a3a" />
  </g>

  <!-- Piston + Connecting Rod -->
  <g transform="translate(250,161) rotate(-45)">
    <rect x="-7" y="-20" width="14" height="74" rx="7" fill="url(#iconGrad)" />
    <rect x="-28" y="-60" width="56" height="38" rx="5" fill="url(#iconGrad)" />
    <rect x="-28" y="-52" width="56" height="6" rx="2" fill="#909090" />
    <rect x="-28" y="-41" width="56" height="6" rx="2" fill="#909090" />
    <circle cx="0" cy="-22" r="8" fill="#3a3a3a" stroke="url(#iconGrad)" stroke-width="3" />
    <circle cx="0" cy="54" r="18" fill="none" stroke="url(#iconGrad)" stroke-width="9" />
    <circle cx="0" cy="54" r="6" fill="#3a3a3a" />
  </g>
</svg>
